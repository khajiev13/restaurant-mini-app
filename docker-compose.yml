services:
  postgres:
    image: postgres:16
    container_name: restaurant_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: restaurant_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: restaurant_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  caddy:
    image: caddy:2.11.2-alpine
    container_name: restaurant_caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: restaurant_cloudflared
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --protocol
      - http2
      - --url
      - http://caddy:80
    depends_on:
      caddy:
        condition: service_healthy

  cloudflared_named:
    image: cloudflare/cloudflared:2026.3.0
    container_name: restaurant_cloudflared_named
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --protocol
      - http2
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      caddy:
        condition: service_healthy

  cloudflared_named_replica:
    image: cloudflare/cloudflared:2026.3.0
    container_name: restaurant_cloudflared_named_replica
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - --protocol
      - http2
      - --label
      - replica=secondary
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      caddy:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
