name: CI

on:
  push:
    branches: [main, prod]
  pull_request:
    branches: [main, prod]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      TELEGRAM_BOT_TOKEN: test_token
      JWT_SECRET: test_secret
      PUBLIC_APP_URL: https://app.example
      ALIPOS_API_CLIENT_ID: test_client_id
      ALIPOS_API_CLIENT_SECRET: test_client_secret
      ALIPOS_RESTAURANT_ID: 11111111-1111-4111-8111-111111111111
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
      POSTGRES_HOST: localhost

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run database migrations
        run: |
          python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          from app.models.models import Base

          async def main():
              engine = create_async_engine('postgresql+asyncpg://test:test@localhost:5432/test')
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              await engine.dispose()

          asyncio.run(main())
          "

      - name: Run tests
        run: pytest -v

  admin-concurrency-gate:
    name: Admin concurrency gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gate_user
          POSTGRES_PASSWORD: gate_password_only
          POSTGRES_DB: admin_concurrency_gate_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gate_user -d admin_concurrency_gate_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: gate_user
      POSTGRES_PASSWORD: gate_password_only
      POSTGRES_DB: admin_concurrency_gate_ci
      TELEGRAM_BOT_TOKEN: test_token
      JWT_SECRET: test_secret
      PUBLIC_APP_URL: https://app.example
      ALIPOS_API_CLIENT_ID: test_client_id
      ALIPOS_API_CLIENT_SECRET: test_client_secret
      ALIPOS_RESTAURANT_ID: 11111111-1111-4111-8111-111111111111
      RUN_DESTRUCTIVE_POSTGRES_TESTS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv pip install --system -r requirements-dev.txt

      - name: Prove final-admin concurrency gate
        run: |
          python -m pytest \
            tests/test_admin_user_service.py::test_concurrent_admin_demotions_do_not_remove_all_admins \
            -q --junitxml=/tmp/admin-concurrency-gate.xml

      - name: Require one passing, non-skipped proof
        run: |
          python -c '
          import sys
          import xml.etree.ElementTree as ET
          root = ET.parse(sys.argv[1]).getroot()
          suites = [root] if root.tag == "testsuite" else list(root.iter("testsuite"))
          totals = tuple(sum(int(s.attrib.get(key, 0)) for s in suites) for key in ("tests", "failures", "errors", "skipped"))
          assert totals == (1, 0, 0, 0), totals
          ' /tmp/admin-concurrency-gate.xml

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test
