gzip on;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
gzip_min_length 1024;
gzip_comp_level 6;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Serve the React SPA — any unknown path returns index.html
    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }

    # Telegram's webview can cache an older HTML shell that still points
    # at a previous hashed bootstrap asset. Fall back to the stable app
    # entry files so redeploys don't produce a blank screen.
    location ~ ^/assets/.*\.js$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri /assets/app.js;
    }

    location ~ ^/assets/.*\.css$ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri /assets/app.css;
    }

    # Cache fingerprinted images and fonts aggressively.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
